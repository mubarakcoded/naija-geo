name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Full test matrix (stable + beta) ────────────────────────────────────────
  test:
    name: Test — Rust ${{ matrix.rust }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
        os:   [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo test (default features)
        run: cargo test --verbose

      - name: cargo test (all features)
        run: cargo test --all-features --verbose

      - name: cargo test (no default features)
        run: cargo test --no-default-features --verbose

  # ── MSRV — verify the library compiles on the declared minimum Rust version ─
  # Dev-dependencies (e.g. serde_json) intentionally require newer Rust;
  # we only check that the *library* itself (and its optional features) compile.
  msrv:
    name: MSRV (Rust 1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75
        uses: dtolnay/rust-toolchain@1.75

      - name: cargo check — default features
        run: cargo check --verbose

      - name: cargo check — all features
        run: cargo check --all-features --verbose

      - name: cargo check — no default features
        run: cargo check --no-default-features --verbose

  # ── Linting ─────────────────────────────────────────────────────────────────
  lint:
    name: Clippy + rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable + clippy + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: rustfmt check
        run: cargo fmt --all -- --check

      - name: clippy (all features, deny warnings)
        run: cargo clippy --all-features -- -D warnings

  # ── Docs ────────────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo doc (all features, no deps)
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
